<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Expenses</h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="tab-btn" onclick="switchTab('recent')">Recent</button>
        </div>

        <!-- DASHBOARD TAB -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="date-filter">
                <input type="date" id="start-date" onchange="applyDateFilter()">
                <span>to</span>
                <input type="date" id="end-date" onchange="applyDateFilter()">
                <button onclick="clearDateFilter()">Clear</button>
            </div>

            <div class="summary-card total-card">
                <h3>Total Expense</h3>
                <p id="total-amount">$0.00</p>
            </div>

            <h2>By Category</h2>
            <div class="grid" id="category-grid">
                <!-- Categories injected here -->
            </div>
        </div>
        <!-- RECENT TAB -->

        <div id="tab-recent" class="tab-content">
            <p style="color: #666; font-size: 14px; text-align: center; margin-bottom: 15px;">Swipe left on an item to delete.</p>
            <div class="recent-list" id="recent-list">
                <!-- Recent items injected here -->
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Expense</h2>
            <input type="hidden" id="edit-row">
            <input type="date" id="edit-date">
            <input type="text" id="edit-item" placeholder="Item Name">
            <input type="number" id="edit-amount" placeholder="Amount">
            <select id="edit-category">
                <option value="Housing">Housing</option>
                <option value="Utilities">Utilities</option>
                <option value="Insurance">Insurance</option>
                <option value="Groceries">Groceries</option>
                <option value="Dining Out">Dining Out</option>
                <option value="Transportation">Transportation</option>
                <option value="Household">Household</option>
                <option value="Health & Care">Health & Care</option>
                <option value="Subscriptions">Subscriptions</option>
                <option value="Shopping">Shopping</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Travel">Travel</option>
                <option value="Gifts">Gifts</option>
                <option value="Education">Education</option>
                <option value="Misc">Misc</option>
            </select>
            <button id="save-edit-btn" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
    
    <script src="app.js"></script>
            <!-- DASHBOARD TAB Push-->

</body>
</html>
                <!-- Vercel push -->
