<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
        </header>
        
        <div class="add-expense">
            <input type="text" id="expense-input" placeholder="e.g. Spent $15 on Starbucks for food" onkeypress="if(event.key === 'Enter') addExpense()">
            <button id="submit-btn" onclick="addExpense()">Add</button>
        </div>

        <div class="stats" id="category-stats">
            <!-- Category totals will be injected here -->
        </div>
        
        <div class="total-summary">
            <h2>Total: <span id="total-amount">$0.00</span></h2>
        </div>

        <div class="recent-header">
            <h2>Recent Expenses</h2>
        </div>
        
        <div id="loading">Loading your expenses...</div>
        
        <div class="expense-list-container">
            <ul id="expense-list">
                <!-- Expenses will be injected here as swipeable items -->
            </ul>
        </div>
    </div>
     <!-- Vercel trigger -->
    <script src="app.js"></script>
</body>
</html>
