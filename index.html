<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
        </header>
        
        <div class="add-expense">
            <input type="text" id="expense-input" placeholder="e.g. Spent $15 on Starbucks for food" onkeypress="if(event.key === 'Enter') addExpense()">
            <button id="submit-btn" onclick="addExpense()">Add</button>
        </div>

        <div class="stats" id="category-stats">
            <!-- Category totals will be injected here -->
        </div>
        
        <div class="total-summary">
            <h2>Total: <span id="total-amount">$0.00</span></h2>
        </div>

        <div class="recent-header">
            <h2>Recent Expenses</h2>
        </div>
        
        <div id="loading">Loading your expenses...</div>
        
        <div class="expense-list-container">
            <ul id="expense-list">
                <!-- Expenses will be injected here as swipeable items -->
            </ul>
        </div>
    </div>
    
    <!-- Edit Expense Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h2>Edit Expense</h2>
            <div class="modal-form">
                <input type="hidden" id="edit-row">
                <label for="edit-item">Item Description</label>
                <input type="text" id="edit-item" placeholder="e.g. Starbucks">
                
                <label for="edit-amount">Amount ($)</label>
                <input type="number" id="edit-amount" step="0.01" placeholder="e.g. 15.00">
                
                <label for="edit-category">Category</label>
                <input type="text" id="edit-category" placeholder="e.g. Food">
                
                <label for="edit-date">Date</label>
                <input type="date" id="edit-date">
                
                <button id="save-edit-btn" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
    <!-- Vercel trigger -->
