<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Expense Dashboard</h1>
        
        <div class="add-expense">
            <input type="text" id="expense-input" placeholder="e.g., Dinner at McDonald's $15">
            <button onclick="addExpense()" id="submit-btn">Add Expense</button>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Total Expenses</h3>
                <p id="total-amount">$0.00</p>
            </div>
        </div>

        <h2>Recent Expenses</h2>
        <div id="loading">Loading data...</div>
        <table id="expense-table" style="display: none;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="expense-list"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
