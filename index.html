<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Expenses</h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="tab-btn" onclick="switchTab('recent')">Recent</button>
            <button class="tab-btn" onclick="switchTab('yearly')">Yearly</button>
        </div>

        <!-- DASHBOARD TAB -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="date-filter">
                <input type="date" id="start-date" onchange="applyDateFilter()">
                <span>to</span>
                <input type="date" id="end-date" onchange="applyDateFilter()">
                <button onclick="clearDateFilter()">Clear</button>
            </div>

            <div class="summary-card total-card">
                <h3>Total Expense</h3>
                <p id="total-amount">$0.00</p>
            </div>

            <h2>By Category</h2>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
            <div id="category-details-container" style="margin-top: 20px;"></div>
        </div>

        
        <!-- YEARLY TAB -->
        <div id="tab-yearly" class="tab-content">
            <h2>Monthly Expenses by Category</h2>
            <div class="chart-container" style="height: 500px;">
                <canvas id="yearlyChart"></canvas>
            </div>
        </div>

        <!-- RECENT TAB -->
        <div id="tab-recent" class="tab-content">
            <div class="recent-header-controls">
                <button id="select-mode-btn" onclick="toggleSelectMode()">Select</button>
                <button id="bulk-delete-btn" class="danger-btn" style="display: none;" onclick="deleteSelected()">Delete Selected</button>
            </div>
            <div class="recent-list" id="recent-list">
                <!-- Recent items injected here -->
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Expense</h2>
            <input type="hidden" id="edit-row">
            <input type="date" id="edit-date">
            <input type="text" id="edit-item" placeholder="Item Name">
            <input type="number" id="edit-amount" placeholder="Amount">
            <select id="edit-category">
                <option value="Housing">Housing</option>
                <option value="Utilities">Utilities</option>
                <option value="Insurance">Insurance</option>
                <option value="Groceries">Groceries</option>
                <option value="Dining Out">Dining Out</option>
                <option value="Transportation">Transportation</option>
                <option value="Household">Household</option>
                <option value="Health & Care">Health & Care</option>
                <option value="Subscriptions">Subscriptions</option>
                <option value="Shopping">Shopping</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Travel">Travel</option>
                <option value="Gifts">Gifts</option>
                <option value="Education">Education</option>
                <option value="Misc">Misc</option>
            </select>
            <button id="save-edit-btn" onclick="saveEdit()">Save Changes</button>
            <button id="delete-edit-btn" class="danger-btn" style="margin-top: 10px;" onclick="deleteFromEdit()">Delete</button>
        </div>
    </div>
    
    <!-- Add Expense FAB and Modal -->
    <div class="fab-container">
        <button class="fab secondary-fab" onclick="toggleChatModal()">✨</button>
        <button id="fab" class="fab" onclick="toggleAddModal()">+</button>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleAddModal()">&times;</span>
            <h2>Add Expense</h2>
            <input type="date" id="add-date" required>
            <input type="text" id="add-item" placeholder="What did you buy?" required>
            <input type="number" id="add-amount" placeholder="Amount ($)" step="0.01" required>
            <select id="add-category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Travel">Travel</option>
                <option value="Gifts">Gifts</option>
                <option value="Education">Education</option>
                <option value="Misc">Misc</option>
            </select>
            <button id="add-expense-btn" onclick="addExpense()">Add Expense</button>
        </div>
    </div>

    <script src="app.js"></script>

    <!-- CHAT MODAL -->
    <div id="chat-modal" class="modal">
        <div class="modal-content chat-modal-content">
            <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="width: 24px;"></div>
                <h2 style="margin: 0; font-size: 1.2rem;">✨ AI Assistant</h2>
                <span class="close" onclick="toggleChatModal()" style="color: white; cursor: pointer; font-size: 28px; line-height: 1;">&times;</span>
            </div>
            <div id="chat-history" class="chat-history">
                <div class="chat-message ai-message">Hi! I can help you add, delete, or summarize expenses. How can I help today?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="e.g., I spent $15 on coffee..." onkeypress="handleChatKeyPress(event)">
                <button id="send-chat-btn" onclick="sendChatMessage()">&#10148;</button>
            </div>
        </div>
    </div>
</body>
</html>
